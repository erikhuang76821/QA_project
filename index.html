<!DOCTYPE html>
<html lang="zh-TW">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>案件管理系統</title>
    <!-- 引入 Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>

    <!-- 引入 Babel 用於解析 JSX -->
    <!-- 修正：鎖定 Babel 版本至 7.24.7 以避免 targets["esmodules"] 驗證錯誤 -->
    <script src="https://unpkg.com/@babel/standalone@7.24.7/babel.min.js"></script>

    <!-- 設定 Import Map，讓瀏覽器知道去哪裡抓 react 和 lucide -->
    <script type="importmap">
    {
        "imports": {
            "react": "https://esm.sh/react@18.2.0",
            "react-dom/client": "https://esm.sh/react-dom@18.2.0/client",
            "lucide-react": "https://esm.sh/lucide-react@0.292.0"
        }
    }
    </script>
    <style>
        /* 隱藏捲軸但保持功能 (Chrome, Safari, Opera) */
        .no-scrollbar::-webkit-scrollbar {
            display: none;
        }

        /* 隱藏捲軸 (IE, Edge, Firefox) */
        .no-scrollbar {
            -ms-overflow-style: none;
            /* IE and Edge */
            scrollbar-width: none;
            /* Firefox */
        }

        html {
            scroll-behavior: smooth;
        }


    </style>
</head>

<body class="bg-slate-50">
    <div id="root"></div>

    <!-- 你的程式碼邏輯放在這裡 -->
    <script type="text/babel" data-type="module">
        import React, { useState, useEffect, useRef, useCallback, useMemo } from 'react';
        import { createRoot } from 'react-dom/client';
        import {
            FileSpreadsheet, Table, Search, AlertCircle, Key, Check,
            Loader2, Info, Globe, Lock, LayoutDashboard, Settings,
            Activity, MessageSquare, AlertTriangle, Calendar, Clock,
            User, ArrowUpDown, ArrowUp, ArrowDown, RefreshCw,
            Zap, Send, BarChart3, X, Filter, ListFilter, ExternalLink,
            Merge, Trash2, Plus, Timer, Percent, ChevronRight, Sun, Moon,
            Users, ChevronDown, ChevronUp, Briefcase, Anchor, Hourglass,
            GanttChart, GripHorizontal
        } from 'lucide-react';

        const App = () => {
            // --- 1. 狀態管理 ---
            const [activeTab, setActiveTab] = useState('dashboard');

            // Google Sheets 設定
            const [url, setUrl] = useState('https://docs.google.com/spreadsheets/d/1h9y5EMPISDJUXae1YRSVIJ-FBW-JvB0spADmzrzcIs8/edit#gid=0');
            const [spreadsheetId, setSpreadsheetId] = useState('');
            const [mode, setMode] = useState('public');
            const [apiKey, setApiKey] = useState('');

            // 範圍參數
            const [sheetName, setSheetName] = useState('案件反饋');
            const [startCol, setStartCol] = useState('B');
            const [endCol, setEndCol] = useState('L');
            const [startRow, setStartRow] = useState('2');
            const [endRow, setEndRow] = useState('');

            // 資料
            const [data, setData] = useState(null);
            const [loading, setLoading] = useState(false);
            const [error, setError] = useState(null);
            const [constructedRange, setConstructedRange] = useState('');
            const [lastUpdatedTime, setLastUpdatedTime] = useState(null);

            // --- 新增功能狀態 ---

            // 自動刷新
            const [autoRefresh, setAutoRefresh] = useState(false);
            const [refreshInterval, setRefreshInterval] = useState(5); // 分鐘
            const [countdown, setCountdown] = useState(0); // 倒數計時用

            // Telegram 通知
            // *設定 : 請預設chat id = 1326042316
            const [tgToken, setTgToken] = useState('7759005999:AAGynjlqnLPCk_zSVQi0AvtOtYOpWHQGHzA');
            const [tgChatId, setTgChatId] = useState('1326042316');
            const [tgTestStatus, setTgTestStatus] = useState(''); // 測試按鈕狀態

            // Redmine 設定 (新增功能 1)
            const [redmineToken, setRedmineToken] = useState('');
            const [redmineData, setRedmineData] = useState({}); // { issueId: { spent: 0, estimated: 0 } }
            const [loadingRedmine, setLoadingRedmine] = useState(false);

            // Redmine 筆記 (點擊展開用)
            const [redmineNotes, setRedmineNotes] = useState({}); // { issueId: '最後一筆筆記內容' | null }
            // 點擊展開的 ticket (取代原本 hover tooltip)
            const [expandedTickets, setExpandedTickets] = useState({});

            // 比對用：儲存上一次的資料快照
            const prevDataRef = useRef(null);

            // 排序狀態 (Dashboard)
            const [sortConfig, setSortConfig] = useState({ key: null, direction: 'asc' });
            // 分析頁面的月度篩選
            const [selectedMonth, setSelectedMonth] = useState('');

            // 分析頁面：選中的窗口與排序
            const [selectedWindow, setSelectedWindow] = useState(null);
            const [windowSort, setWindowSort] = useState({ key: 'quality', direction: 'asc' }); // 預設品質由低到高 (asc)

            // 分析頁面：案件清單的篩選與排序狀態
            const [caseFilter, setCaseFilter] = useState('all');
            const [caseSort, setCaseSort] = useState('date-desc');

            // *分析: 專案類型選取與詳細篩選
            const [selectedType, setSelectedType] = useState(null);
            const [typeDetailFilter, setTypeDetailFilter] = useState('late'); // 預設顯示延遲

            // *設定: 專案合併規則 state
            // 結構: [{ id: 1, targetName: '合併後名稱', sources: ['原名稱1', '原名稱2'] }]
            const [mergeRules, setMergeRules] = useState([]);
            // 輔助輸入 state
            const [editingRuleName, setEditingRuleName] = useState('');
            const [editingSource, setEditingSource] = useState('');

            // 標記最長天數的 ID (用於跳轉)
            const [highlightId, setHighlightId] = useState(null);

            // 分配概況展開狀態
            const [expandedPersons, setExpandedPersons] = useState({});

            // --- 案件排程甘特圖 state ---
            const [ganttIssues, setGanttIssues] = useState([]);
            const [ganttLoading, setGanttLoading] = useState(false);
            // 拖曳暫存: { issueId, newStart, newEnd, originalStart, originalEnd }
            const [ganttPendingUpdate, setGanttPendingUpdate] = useState(null);

            // --- 2. 輔助邏輯 ---

            useEffect(() => {
                const match = url.match(/\/d\/([a-zA-Z0-9-_]+)/);
                if (match && match[1]) {
                    setSpreadsheetId(match[1]);
                }
            }, [url]);

            useEffect(() => {
                const safeSheetName = sheetName.includes(' ') ? `'${sheetName}'` : sheetName;
                const range = `${safeSheetName}!${startCol}${startRow}:${endCol}${endRow}`;
                setConstructedRange(range);
            }, [sheetName, startCol, endCol, startRow, endRow]);

            useEffect(() => {
                setSelectedWindow(null);
                setSelectedType(null); // 切換月份或資料更新時重置
                setCaseFilter('all');
            }, [selectedMonth, data]);

            // 日期處理
            const formatSimpleDate = (dateStr) => {
                if (!dateStr) return '';
                const str = String(dateStr);
                if (str.startsWith('Date(')) {
                    const parts = str.match(/Date\((\d+),(\d+),(\d+)\)/);
                    if (parts) return `${parts[1]}/${parseInt(parts[2]) + 1}/${parts[3]}`;
                }
                const d = new Date(str);
                if (!isNaN(d.getTime())) return `${d.getFullYear()}/${d.getMonth() + 1}/${d.getDate()}`;
                return str;
            };

            const getMonthStr = (dateStr) => {
                if (!dateStr) return '未知月份';
                const str = String(dateStr);
                let d;
                if (str.startsWith('Date(')) {
                    const parts = str.match(/Date\((\d+),(\d+),(\d+)\)/);
                    if (parts) d = new Date(parts[1], parts[2], parts[3]);
                } else {
                    d = new Date(str);
                }
                return (d && !isNaN(d.getTime())) ? `${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, '0')}` : '未知月份';
            };

            // 計算累計天數
            const getDaysDiff = (dateStr) => {
                const now = new Date();
                let date = null;
                const dStr = String(dateStr);
                if (dStr.startsWith('Date(')) {
                    const parts = dStr.match(/Date\((\d+),(\d+),(\d+)\)/);
                    if (parts) {
                        date = new Date(parseInt(parts[1]), parseInt(parts[2]), parseInt(parts[3]));
                    }
                } else {
                    date = new Date(dStr);
                }
                if (date && !isNaN(date.getTime())) {
                    const diffTime = Math.abs(now - date);
                    return Math.floor(diffTime / (1000 * 60 * 60 * 24));
                }
                return 0;
            };

            // 判斷邏輯
            const isLate = (row) => {
                const val = row[9]; // K欄
                if (!val) return false;
                const str = String(val).trim();
                const safeWords = ['無', '沒有', '空白', ''];
                return !safeWords.includes(str);
            };

            const isFeedbackCountable = (val) => {
                if (!val) return false;
                const str = String(val).trim();
                const excludeList = ['空白', '無', '外包協測', '外包主測', '外包測試'];
                return !excludeList.includes(str);
            };

            // *分析: 取得合併後的專案名稱
            const getMergedTypeName = (originalName) => {
                if (!originalName) return '未分類';
                const rule = mergeRules.find(r => r.sources.includes(originalName));
                return rule ? rule.targetName : originalName;
            };

            // *分析: 點擊人名邏輯 (開/關)
            const handleWindowClick = (name) => {
                if (selectedWindow === name) {
                    setSelectedWindow(null);
                } else {
                    setSelectedWindow(name);
                    setSelectedType(null); // 互斥
                }
            };

            // *分析: 點擊類型邏輯 (開/關)
            const handleTypeClick = (name) => {
                if (selectedType === name) {
                    setSelectedType(null);
                } else {
                    setSelectedType(name);
                    setSelectedWindow(null); // 互斥
                    setTypeDetailFilter('late'); // 預設篩選延遲
                }
            }

            // 取得選中窗口的詳細資料
            const getSelectedWindowData = useMemo(() => {
                if (!data || !selectedWindow) return [];

                let targetData = data;
                if (selectedMonth) {
                    targetData = targetData.filter(row => getMonthStr(row[2]) === selectedMonth);
                }

                // *優化: 篩選時同樣進行 trim() 處理，確保能匹配到正規化後的名稱
                let windowData = targetData.filter(row => String(row[5] || '').trim() === selectedWindow || (!row[5] && selectedWindow === '未指定'));

                if (caseFilter === 'issue') {
                    windowData = windowData.filter(row => isFeedbackCountable(row[8]));
                } else if (caseFilter === 'late') {
                    windowData = windowData.filter(row => isLate(row));
                }

                windowData.sort((a, b) => {
                    const dateA = new Date(a[2] || 0);
                    const dateB = new Date(b[2] || 0);
                    return caseSort === 'date-asc' ? dateA - dateB : dateB - dateA;
                });

                return windowData;
            }, [data, selectedWindow, selectedMonth, caseFilter, caseSort]);

            // *分析: 取得選中類型的詳細資料
            const getSelectedTypeData = useMemo(() => {
                if (!data || !selectedType) return [];

                let targetData = data;
                if (selectedMonth) {
                    targetData = targetData.filter(row => getMonthStr(row[2]) === selectedMonth);
                }

                // 篩選該類型 (包含合併規則)
                let typeData = targetData.filter(row => {
                    const tName = getMergedTypeName(row[0] || '未分類');
                    return tName === selectedType;
                });

                // 篩選器
                if (typeDetailFilter === 'issue') {
                    typeData = typeData.filter(row => isFeedbackCountable(row[8]));
                } else if (typeDetailFilter === 'late') {
                    typeData = typeData.filter(row => isLate(row));
                }

                // 預設依日期排序 (新到舊)
                typeData.sort((a, b) => {
                    const dateA = new Date(a[2] || 0);
                    const dateB = new Date(b[2] || 0);
                    return dateB - dateA;
                });

                return typeData;
            }, [data, selectedType, selectedMonth, typeDetailFilter, mergeRules]);

            // *分配概況: 資料統計
            const assignmentStats = useMemo(() => {
                if (!data) return { morning: [], middle: [], outsourcing: [] };

                const activeData = data.filter(row => !row[3]); // 篩選進行中案件

                // 1. 分離外包與內部案件
                const outsourcingTickets = [];
                const internalTickets = [];

                activeData.forEach(row => {
                    const feedback = String(row[8] || '');
                    if (feedback.includes('外包主測')) {
                        outsourcingTickets.push(row);
                    } else {
                        internalTickets.push(row);
                    }
                });

                const processGroup = (colIndex, isMiddle = false) => {
                    const groups = {};
                    internalTickets.forEach(row => {
                        let name = String(row[colIndex] || '').trim();
                        // 如果是空白或無效值，統一歸類為 '無窗口' (僅針對顯示，若需排除則保留原邏輯)
                        // 但需求4說 "中班人力分配的'無窗口'無條件置底"，表示需要顯示出來
                        if (!name || name === '-' || name === '0' || name === '無') {
                            name = '無窗口';
                        }

                        if (!groups[name]) {
                            groups[name] = { name, count: 0, feedbackCount: 0, tickets: [], maxDays: 0 };
                        }
                        groups[name].count++;
                        if (isFeedbackCountable(row[8])) groups[name].feedbackCount++;

                        // 計算該案件天數並更新 maxDays
                        const days = getDaysDiff(row[2]);
                        if (days > groups[name].maxDays) {
                            groups[name].maxDays = days;
                        }

                        groups[name].tickets.push(row);
                    });

                    let sortedGroups = Object.values(groups).sort((a, b) => b.count - a.count);

                    // 需求4: 中班 '無窗口' 置底
                    if (isMiddle) {
                        sortedGroups.sort((a, b) => {
                            if (a.name === '無窗口') return 1;
                            if (b.name === '無窗口') return -1;
                            return b.count - a.count; // 保持原有依數量排序
                        });
                    } else {
                        // 早班如果也有 '無窗口'，通常也是過濾掉或放後面，這裡先保留過濾空值的邏輯(如果不想顯示)，
                        // 但既然中班要顯示，早班可能也需要一致性? 
                        // 原程式碼是直接過濾掉 (!name || ... return)。
                        // 為了符合 "中班...無窗口置底"，我上面已經把空值轉為 '無窗口'。
                        // 如果早班想維持 "不顯示無效窗口"，可以過濾掉。
                        // 假設早班邏輯維持原樣 (只顯示有效窗口)，則需在此過濾 '無窗口'
                        // 但為了保險，先不過濾，讓使用者看到所有分配。
                    }

                    // 如果還是希望能隱藏早班的無窗口 (若無特別需求):
                    if (!isMiddle) {
                        sortedGroups = sortedGroups.filter(g => g.name !== '無窗口');
                    }

                    return sortedGroups;
                };

                // 早班 H欄(Index 6), 中班 I欄(Index 7)
                return {
                    morning: processGroup(6, false),
                    middle: processGroup(7, true),
                    outsourcing: outsourcingTickets
                };
            }, [data]);

            const togglePersonExpand = (key) => {
                setExpandedPersons(prev => ({ ...prev, [key]: !prev[key] }));
            };

            const scrollToSection = (id) => {
                const element = document.getElementById(id);
                if (element) {
                    // 減去 header 高度
                    const headerOffset = 80;
                    const elementPosition = element.getBoundingClientRect().top;
                    const offsetPosition = elementPosition + window.pageYOffset - headerOffset;

                    window.scrollTo({
                        top: offsetPosition,
                        behavior: "smooth"
                    });
                }
            };

            // 捲動到指定項目
            const scrollToTicket = (ticketId) => {
                const element = document.getElementById(`ticket-${ticketId}`);
                if (element) {
                    element.scrollIntoView({ behavior: 'smooth', block: 'center' });
                    setHighlightId(ticketId);
                    setTimeout(() => setHighlightId(null), 2000); // 2秒後移除高亮
                }
            };

            // --- 3. Telegram 通知核心邏輯 ---
            const sendTelegramMessage = useCallback(async (text) => {
                if (!tgToken || !tgChatId) return;
                try {
                    const url = `https://api.telegram.org/bot${tgToken}/sendMessage`;
                    const response = await fetch(url, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ chat_id: tgChatId, text: text, parse_mode: 'HTML' })
                    });
                    const resData = await response.json();
                    console.log('TG Send Result:', resData);
                } catch (e) { console.error('TG 發送失敗', e); }
            }, [tgToken, tgChatId]);

            const checkAndNotify = useCallback((newData) => {
                if (!prevDataRef.current) { prevDataRef.current = newData; return; }
                const oldData = prevDataRef.current;

                // 定義正規化函式：將 '空白', '無', '' 視為相同
                const normalize = (val) => {
                    const str = String(val ?? '').trim();
                    return ['空白', '無', ''].includes(str) ? '' : str;
                };

                if (newData.length > oldData.length) {
                    const newRows = newData.slice(oldData.length);
                    newRows.forEach(row => {
                        if (row[0]) {
                            const msg = `🆕 <b>新增任務</b>\n任務內容：${row[4] || '(無名稱)'} , 品檢: ${row[6] || ''}`;
                            sendTelegramMessage(msg);
                        }
                    });
                }

                const compareLength = Math.min(oldData.length, newData.length);
                for (let i = 0; i < compareLength; i++) {
                    const oldRow = oldData[i]; const newRow = newData[i];

                    const oldJ = normalize(oldRow[8]); const newJ = normalize(newRow[8]);
                    const oldK = normalize(oldRow[9]); const newK = normalize(newRow[9]);

                    let changeDesc = '';
                    // 只有在正規化後的值不同時才發送通知 (修正1: 移除欄位代號)
                    if (oldJ !== newJ) changeDesc += `\n狀況反饋: "${oldRow[8] || '無'}" ➔ "${newRow[8] || '無'}"`;
                    if (oldK !== newK) changeDesc += `\n遲送狀態: "${oldRow[9] || '無'}" ➔ "${newRow[9] || '無'}"`;

                    if (changeDesc) {
                        const now = new Date();
                        const timeStr = `${now.getFullYear()}/${now.getMonth() + 1}/${now.getDate()} ${String(now.getHours()).padStart(2, '0')}:${String(now.getMinutes()).padStart(2, '0')}`;
                        const msg = `⚠️ <b>測試狀況異動</b> : ${timeStr}\n任務：${newRow[4] || '(無名稱)'}${changeDesc}`;
                        sendTelegramMessage(msg);
                    }
                }
                prevDataRef.current = newData;
            }, [sendTelegramMessage]);

            const getTgUpdates = async () => {
                if (!tgToken) { setTgTestStatus('請先輸入 Token'); return; }
                setTgTestStatus('連線中...');
                try {
                    const res = await fetch(`https://api.telegram.org/bot${tgToken}/getUpdates`);
                    const data = await res.json();
                    if (data.ok && data.result.length > 0) {
                        const lastMsg = data.result[data.result.length - 1];
                        const chatId = lastMsg.message?.chat?.id || lastMsg.my_chat_member?.chat?.id;
                        if (chatId) {
                            setTgChatId(String(chatId)); setTgTestStatus(`成功! ID: ${chatId}`);
                        } else { setTgTestStatus('找不到 Chat ID'); }
                    } else { setTgTestStatus('無新訊息'); }
                } catch (e) { setTgTestStatus('連線失敗'); }
            };

            // --- 4. Redmine 資料讀取 (利用 Proxy 策略) ---
            const fetchRedmineData = useCallback(async (ticketIds) => {
                if (!redmineToken || ticketIds.length === 0) return;
                setLoadingRedmine(true);
                const newRedmineData = { ...redmineData };

                const validIds = ticketIds.filter(id => id);
                const uniqueIds = [...new Set(validIds)];

                // 定義 Proxy 策略 (參考成功範例)
                // 注意：將 API Key 放在 URL 參數中以便通過 Proxy 傳遞
                const getStrategies = (targetUrl) => [
                    {
                        name: "CodeTabs",
                        getUrl: (url) => `https://api.codetabs.com/v1/proxy?quest=${encodeURIComponent(url)}`
                    },
                    {
                        name: "AllOrigins (JSON)",
                        getUrl: (url) => `https://api.allorigins.win/get?url=${encodeURIComponent(url)}&_t=${Date.now()}`
                    },
                    {
                        name: "CorsProxy.io",
                        getUrl: (url) => `https://corsproxy.io/?${encodeURIComponent(url)}`
                    }
                ];

                // 單一議題讀取函式
                const fetchIssue = async (rawId) => {
                    const id = String(rawId).trim();
                    if (!id) return;

                    // 1. 建構目標 URL (含 Key)
                    const targetUrl = `https://igs.redmine-x.com/issues/${id}.json?key=${redmineToken}`;
                    const strategies = getStrategies(targetUrl);

                    for (const strategy of strategies) {
                        try {
                            const finalUrl = strategy.getUrl(targetUrl);
                            const response = await fetch(finalUrl);

                            if (!response.ok) continue; // 嘗試下一個策略

                            const text = await response.text();

                            // 檢查是否為 HTML 錯誤頁 (Redmine 常見行為)
                            if (text.trim().startsWith("<") && text.includes("html")) {
                                if (strategy.name !== "AllOrigins (JSON)") {
                                    console.warn(`Redmine fetch warning for #${id}: Received HTML via ${strategy.name}`);
                                    continue;
                                }
                            }

                            let json;
                            try {
                                json = JSON.parse(text);
                            } catch (e) { continue; }

                            // 處理 AllOrigins 的 Wrapper
                            let finalData = json;
                            if (strategy.name === "AllOrigins (JSON)") {
                                if (json.contents) {
                                    try {
                                        finalData = JSON.parse(json.contents);
                                    } catch (e) { continue; }
                                } else { continue; }
                            }

                            if (finalData && finalData.issue) {
                                newRedmineData[id] = {
                                    spent: parseFloat(finalData.issue.spent_hours) || 0,
                                    estimated: parseFloat(finalData.issue.estimated_hours) || 0,
                                    dueDate: finalData.issue.due_date || null,
                                    status: 'ok'
                                };
                                return; // 成功，結束此 ID 的處理
                            }
                        } catch (e) {
                            // console.warn(`Strategy ${strategy.name} failed for #${id}`, e);
                        }
                    }

                    // 若所有策略都失敗
                    if (!newRedmineData[id]) {
                        // 標記失敗，避免重複請求

                    }
                };

                await Promise.all(uniqueIds.map(id => fetchIssue(id)));

                setRedmineData(newRedmineData);

            // --- 4.5 Redmine 筆記讀取 (hover tooltip 用) ---
            const fetchRedmineNote = useCallback(async (issueId) => {
                const cleanId = String(issueId).trim();
                if (!redmineToken || !cleanId || redmineNotes[cleanId] !== undefined) return;
                // 標記 loading 避免重複請求
                setRedmineNotes(prev => ({ ...prev, [cleanId]: null }));

                const targetUrl = `https://igs.redmine-x.com/issues/${cleanId}.json?key=${redmineToken}&include=journals`;
                const strategies = [
                    { name: "CodeTabs", getUrl: (url) => `https://api.codetabs.com/v1/proxy?quest=${encodeURIComponent(url)}` },
                    { name: "AllOrigins (JSON)", getUrl: (url) => `https://api.allorigins.win/get?url=${encodeURIComponent(url)}&_t=${Date.now()}` },
                    { name: "CorsProxy.io", getUrl: (url) => `https://corsproxy.io/?${encodeURIComponent(url)}` }
                ];

                for (const strategy of strategies) {
                    try {
                        const finalUrl = strategy.getUrl(targetUrl);
                        const response = await fetch(finalUrl);
                        if (!response.ok) continue;
                        const text = await response.text();
                        if (text.trim().startsWith("<") && text.includes("html") && strategy.name !== "AllOrigins (JSON)") continue;

                        let json;
                        try { json = JSON.parse(text); } catch (e) { continue; }

                        let finalData = json;
                        if (strategy.name === "AllOrigins (JSON)") {
                            if (json.contents) { try { finalData = JSON.parse(json.contents); } catch (e) { continue; } } else { continue; }

            // 計算剩餘天數 (完成日期 - 今日，可為負)

            // 展開的 ticket 詳情列元件
            const TicketDetailRow = ({ ticketId, colSpan }) => {

            // --- 5. 資料讀取 (Fetch) ---
            const fetchData = useCallback(async (isAuto = false) => {

                        const response = await fetch(mode === 'api' && headers.Authorization ? `https://sheets.googleapis.com/v4/spreadsheets/${spreadsheetId}/values/${encodeURIComponent(constructedRange)}` : apiUrl, { headers });

                        values = json.table.rows.map(row => row.c.map(cell => (cell && cell.v !== null) ? cell.v : ''));

                    const currentStartRow = parseInt(startRow) || 1;
                    const valuesWithMeta = values.map((row, index) => { const newRow = [...row]; newRow.push(currentStartRow + index); return newRow; });
                    const filteredValues = valuesWithMeta.filter(row => row[0] !== undefined && row[0] !== '' && row[0] !== null);
                    setData(filteredValues); setLastUpdatedTime(new Date());

                    // 觸發 Redmine 資料讀取 (讀取 active 的單號)
                    const activeTicketIds = filteredValues.filter(row => !row[3]).map(row => row[1]); // C欄為單號

            }, [spreadsheetId, constructedRange, mode, apiKey, sheetName, startCol, endCol, startRow, endRow, checkAndNotify, fetchRedmineData]);

            // --- 6. 自動刷新計時器 ---
            useEffect(() => {
                let timer = null; let counter = null;
                if (autoRefresh && refreshInterval > 0) {

                    counter = setInterval(() => { setCountdown(prev => (prev <= 1 ? refreshInterval * 60 : prev - 1)); }, 1000);
                    timer = setInterval(() => { fetchData(true); }, refreshInterval * 60 * 1000);
                } else { setCountdown(0); }
                return () => { if (timer) clearInterval(timer); if (counter) clearInterval(counter); };
            }, [autoRefresh, refreshInterval, fetchData]);

            // --- 統計計算 ---
            const activeStats = useMemo(() => {
                if (!data) return null;
                const activeData = data.filter(row => !row[3]); // E欄(Index 3)無結束日期
                const lateCount = activeData.filter(row => isLate(row)).length;
                const feedbackCount = activeData.filter(row => isFeedbackCountable(row[8])).length;

                // 計算最長天數
                let maxDays = 0;
                let maxDaysTicket = null;
                const now = new Date();

                activeData.forEach(row => {
                    // D欄 (Index 2) 為送測日
                    let date = null;
                    const dStr = String(row[2]);
                    if (dStr.startsWith('Date(')) {
                        const parts = dStr.match(/Date\((\d+),(\d+),(\d+)\)/);
                        if (parts) {
                            date = new Date(parseInt(parts[1]), parseInt(parts[2]), parseInt(parts[3]));
                        }
                    } else {
                        date = new Date(dStr);
                    }

                    if (date && !isNaN(date.getTime())) {
                        const diffTime = Math.abs(now - date);
                        const diffDays = Math.floor(diffTime / (1000 * 60 * 60 * 24));
                        if (diffDays > maxDays) {
                            maxDays = diffDays;
                            maxDaysTicket = row;
                        }
                    }
                });

                const sortedList = [...activeData].sort((a, b) => {
                    if (sortConfig.key) {
                        let valA = '', valB = '';
                        if (sortConfig.key === 'type') { valA = a[0] || ''; valB = b[0] || ''; }
                        else if (sortConfig.key === 'feedback') { valA = a[8] || ''; valB = b[8] || ''; }
                        else if (sortConfig.key === 'row') { valA = a[1]; valB = b[1]; } // 改用單號(C欄位, Index 1)排序
                        else if (sortConfig.key === 'morning') { valA = a[6] || ''; valB = b[6] || ''; } // H欄 早班
                        else if (sortConfig.key === 'middle') { valA = a[7] || ''; valB = b[7] || ''; } // I欄 中班
                        else if (sortConfig.key === 'date') {
                            // 解析日期字串為 timestamp 以確保正確排序
                            const getTs = (v) => {
                                const s = String(v || '');
                                if (s.startsWith('Date(')) {
                                    const p = s.match(/Date\((\d+),(\d+),(\d+)\)/);
                                    return p ? new Date(parseInt(p[1]), parseInt(p[2]), parseInt(p[3])).getTime() : 0;
                                }
                                const d = new Date(s);
                                return isNaN(d.getTime()) ? 0 : d.getTime();
                            };
                            return sortConfig.direction === 'asc'
                                ? getTs(a[2]) - getTs(b[2])
                                : getTs(b[2]) - getTs(a[2]);
                        }
                        else return 0;

                        if (valA < valB) return sortConfig.direction === 'asc' ? -1 : 1;
                        if (valA > valB) return sortConfig.direction === 'asc' ? 1 : -1;
                        return 0;
                    }
                    const lateA = isLate(a); const lateB = isLate(b);
                    return (lateA && !lateB) ? -1 : (!lateA && lateB) ? 1 : 0;
                });

                return { list: sortedList, count: activeData.length, lateCount, feedbackCount, maxDays, maxDaysTicket };
            }, [data, sortConfig]);

            const handleSort = (key) => setSortConfig(c => (c.key === key ? { key: c.key, direction: c.direction === 'asc' ? 'desc' : 'asc' } : { key, direction: 'asc' }));
            const getSortIcon = (key) => sortConfig.key !== key ? <ArrowUpDown size={14} className="opacity-30" /> : (sortConfig.direction === 'asc' ? <ArrowUp size={14} className="text-blue-600" /> : <ArrowDown size={14} className="text-blue-600" />);

            // *專案窗口排序邏輯
            const handleWindowSort = (key) => setWindowSort(c => (c.key === key ? { key: c.key, direction: c.direction === 'asc' ? 'desc' : 'asc' } : { key, direction: 'asc' }));
            const getWindowSortIcon = (key) => windowSort.key !== key ? <ArrowUpDown size={12} className="opacity-30" /> : (windowSort.direction === 'asc' ? <ArrowUp size={12} className="text-blue-600" /> : <ArrowDown size={12} className="text-blue-600" />);

            const analyticsStats = useMemo(() => {
                if (!data) return null;
                const months = new Set();
                data.forEach(row => { if (row[2]) months.add(getMonthStr(row[2])); });
                const sortedMonths = Array.from(months).sort().reverse();

                let targetData = data;
                if (selectedMonth) targetData = data.filter(row => getMonthStr(row[2]) === selectedMonth);

                const windowStats = {}; const typeStats = {};

                targetData.forEach(row => {
                    // *優化: 視為同一人的邏輯 (去除空白)
                    const wName = String(row[5] || '').trim() || '未指定';

                    if (!windowStats[wName]) windowStats[wName] = { total: 0, feedback: 0, late: 0 };
                    windowStats[wName].total++;
                    if (isFeedbackCountable(row[8])) windowStats[wName].feedback++;
                    if (isLate(row)) windowStats[wName].late++;

                    // *分析: 應用合併規則
                    let tName = row[0] || '未分類';
                    tName = getMergedTypeName(tName);

                    if (!typeStats[tName]) typeStats[tName] = { total: 0, late: 0 };
                    typeStats[tName].total++;
                    if (isLate(row)) typeStats[tName].late++;
                });

                const maxWindowTotal = Math.max(...Object.values(windowStats).map(d => d.total), 1);

                // *分析: 窗口統計加入品質與排序
                const sortedWindows = Object.entries(windowStats).map(([name, stats]) => {
                    const quality = stats.total > 0 ? (1 - (stats.late / stats.total)) * 100 : 100;
                    return {
                        name,
                        ...stats,
                        quality,
                        totalPercent: (stats.total / maxWindowTotal) * 100,
                        feedbackPercent: (stats.feedback / maxWindowTotal) * 100,
                        latePercent: (stats.late / maxWindowTotal) * 100
                    };
                }).sort((a, b) => {
                    // 根據 windowSort 排序
                    let valA, valB;
                    switch (windowSort.key) {
                        case 'total': valA = a.total; valB = b.total; break;
                        case 'feedback': valA = a.feedback; valB = b.feedback; break;
                        case 'late': valA = a.late; valB = b.late; break;
                        case 'quality': valA = a.quality; valB = b.quality; break;
                        default: valA = a.quality; valB = b.quality; // 預設品質
                    }
                    if (valA < valB) return windowSort.direction === 'asc' ? -1 : 1;
                    if (valA > valB) return windowSort.direction === 'asc' ? 1 : -1;
                    return 0;
                });

                const sortedTypes = Object.entries(typeStats).map(([name, stats]) => ({ name, total: stats.total, late: stats.late, lateRatio: stats.total > 0 ? (stats.late / stats.total) * 100 : 0 })).sort((a, b) => b.lateRatio - a.lateRatio);

                return { months: sortedMonths, totalCount: targetData.length, windows: sortedWindows, types: sortedTypes };
            }, [data, selectedMonth, mergeRules, windowSort]);

            // 合併專案設定邏輯
            const addMergeRule = () => {
                if (!editingRuleName || !editingSource) return;
                setMergeRules(prev => {
                    const existingRule = prev.find(r => r.targetName === editingRuleName);
                    if (existingRule) {
                        if (!existingRule.sources.includes(editingSource)) {
                            return prev.map(r => r.targetName === editingRuleName ? { ...r, sources: [...r.sources, editingSource] } : r);
                        }
                        return prev;
                    } else {
                        return [...prev, { id: Date.now(), targetName: editingRuleName, sources: [editingSource] }];
                    }
                });
                setEditingSource('');
            };

            const removeMergeSource = (ruleId, sourceToRemove) => {
                setMergeRules(prev => prev.map(r => {
                    if (r.id === ruleId) {
                        const newSources = r.sources.filter(s => s !== sourceToRemove);
                        return newSources.length === 0 ? null : { ...r, sources: newSources };
                    }
                    return r;
                }).filter(Boolean));
            };

            // --- 案件排程：Redmine Query 資料拉取 ---
            const fetchGanttData = useCallback(async () => {
                if (!redmineToken) return;
                setGanttLoading(true);
                const targetUrl = `https://igs.redmine-x.com/projects/old_ts_test/issues.json?query_id=1736&key=${redmineToken}&limit=100&sort=start_date:asc`;
                const strategies = [
                    { name: "CodeTabs", getUrl: (url) => `https://api.codetabs.com/v1/proxy?quest=${encodeURIComponent(url)}` },
                    { name: "AllOrigins (JSON)", getUrl: (url) => `https://api.allorigins.win/get?url=${encodeURIComponent(url)}&_t=${Date.now()}` },
                    { name: "CorsProxy.io", getUrl: (url) => `https://corsproxy.io/?${encodeURIComponent(url)}` }
                ];
                for (const strategy of strategies) {
                    try {
                        const finalUrl = strategy.getUrl(targetUrl);
                        const response = await fetch(finalUrl);
                        if (!response.ok) continue;
                        const text = await response.text();
                        if (text.trim().startsWith("<") && text.includes("html") && strategy.name !== "AllOrigins (JSON)") continue;
                        let json; try { json = JSON.parse(text); } catch (e) { continue; }
                        let finalData = json;
                        if (strategy.name === "AllOrigins (JSON)") {
                            if (json.contents) { try { finalData = JSON.parse(json.contents); } catch (e) { continue; } } else { continue; }
                        }
                        if (finalData && finalData.issues) {
                            setGanttIssues(finalData.issues);
                            setGanttLoading(false);
                            return;
                        }
                    } catch (e) { /* 嘗試下一個策略 */ }
                }
                setGanttLoading(false);
            }, [redmineToken]);

            // 切到排程 tab 時自動載入
            useEffect(() => {
                if (activeTab === 'schedule' && redmineToken && ganttIssues.length === 0) {
                    fetchGanttData();
                }
            }, [activeTab, redmineToken]);

            // --- 案件排程：Redmine PUT 更新日期 ---
            const updateIssueDates = useCallback(async (issueId, startDate, dueDate) => {
                if (!redmineToken) return false;
                const targetUrl = `https://igs.redmine-x.com/issues/${issueId}.json?key=${redmineToken}`;
                const body = JSON.stringify({ issue: { start_date: startDate, due_date: dueDate || '' } });
                const strategies = [
                    { name: "CorsProxy.io", getUrl: (url) => `https://corsproxy.io/?${encodeURIComponent(url)}` },
                    { name: "AllOrigins (JSON)", getUrl: (url) => `https://api.allorigins.win/get?url=${encodeURIComponent(url)}&_t=${Date.now()}` }
                ];
                for (const strategy of strategies) {
                    try {
                        const finalUrl = strategy.getUrl(targetUrl);
                        const response = await fetch(finalUrl, {
                            method: 'PUT',
                            headers: { 'Content-Type': 'application/json' },

                        });
                        if (response.ok || response.status === 204 || response.status === 200) {
                            return true;
                        }
                    } catch (e) { /* 嘗試下一個策略 */ }
                }
                return false;
            }, [redmineToken]);

            // --- 案件排程：甘特圖元件 ---
            const GanttChartView = () => {
                const ganttRef = useRef(null);
                const [dragState, setDragState] = useState(null);
                const panRef = useRef(null); // 用 ref 避免 re-render 導致捲動跳回
                const [hoverIssueId, setHoverIssueId] = useState(null);
                const [hoverBarIssueId, setHoverBarIssueId] = useState(null);
                const [updating, setUpdating] = useState(false);
                const [collapsedDays, setCollapsedDays] = useState({}); // Y軸按開始日分組收折

                const today = useMemo(() => {
                    const d = new Date(); d.setHours(0,0,0,0); return d;
                }, []);
                const ganttDays = 30; // 今日往後 1 個月
                const dayWidth = 80;
                const rowHeight = 44;
                const groupHeaderHeight = 30; // 分組標頭高度
                const leftPanelWidth = 400; // 加寬左側欄

                const dateRange = useMemo(() => {
                    const dates = [];
                    for (let i = 0; i < ganttDays; i++) {
                        const d = new Date(today);

                    }

                }, [today]);

                const totalGanttWidth = ganttDays * dayWidth;

                const formatDateStr = (d) => `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
                const parseDate = (str) => { if (!str) return null; const d = new Date(str + 'T00:00:00'); return isNaN(d.getTime()) ? null : d; };

                // Y軸按開始日分組收折
                const toggleCollapseDay = (dateStr) => {
                    setCollapsedDays(prev => ({ ...prev, [dateStr]: !prev[dateStr] }));
                };

                // 按開始日分組的行資料
                const groupedData = useMemo(() => {
                    const groups = {};
                    ganttIssues.forEach(issue => {
                        const key = issue.start_date || 'no-date';
                        if (!groups[key]) groups[key] = [];

                    });
                    const sortedKeys = Object.keys(groups).sort();
                    const rows = [];
                    sortedKeys.forEach(key => {
                        const issues = groups[key];
                        rows.push({ type: 'header', date: key, count: issues.length });
                        if (!collapsedDays[key]) {
                            issues.forEach(issue => rows.push({ type: 'issue', issue }));
                        }
                    });
                    return rows;
                }, [ganttIssues, collapsedDays]);

                // 累積 Y 偏移
                const rowYOffsets = useMemo(() => {
                    let acc = 0;
                    return groupedData.map(row => {
                        const y = acc;
                        acc += row.type === 'header' ? groupHeaderHeight : rowHeight;
                        return y;
                    });
                }, [groupedData]);
                const totalBodyHeight = groupedData.length > 0
                    ? rowYOffsets[rowYOffsets.length - 1] + (groupedData[groupedData.length - 1].type === 'header' ? groupHeaderHeight : rowHeight)
                    : 0;

                // 取得 bar 位置（簡化：固定 dayWidth）
                const getBarPosition = (issue) => {
                    const pending = ganttPendingUpdate && ganttPendingUpdate.issueId === issue.id ? ganttPendingUpdate : null;
                    const startStr = pending ? pending.newStart : issue.start_date;
                    const endStr = pending ? pending.newEnd : issue.due_date;
                    const start = parseDate(startStr);
                    const end = parseDate(endStr);
                    if (!start) return null;
                    const startDiff = Math.floor((start - today) / (1000*60*60*24));
                    const endDate = end || start;
                    const endDiff = Math.floor((endDate - today) / (1000*60*60*24));
                    const duration = endDiff - startDiff + 1;
                    return {
                        left: startDiff * dayWidth,
                        width: Math.max(duration, 1) * dayWidth - 4,
                        startDate: start,
                        endDate: endDate,
                        duration: Math.max(duration, 1)
                    };
                };

                // 滑鼠互動處理（拖曳中不觸發 re-render）
                const dragPendingRef = useRef(null);

                const handleMouseDown = (e, issue, mode) => {
                    e.preventDefault();
                    e.stopPropagation();
                    const pos = getBarPosition(issue);
                    if (!pos) return;

                    const barEl = e.currentTarget.closest('[data-issue-id]');
                    const origWidth = pos.width;

                    // 直接用 ref + DOM 操作，不 setState 避免 re-render
                    const startX = e.clientX;
                    const origStartDate = pos.startDate;
                    const origEndDate = pos.endDate;

                    const handleMouseMove = (ev) => {
                        const dx = ev.clientX - startX;
                        const daysDelta = Math.round(dx / dayWidth);

                        let newStart = new Date(origStartDate);
                        let newEnd = new Date(origEndDate);

                        if (mode === 'move') {
                            newStart.setDate(newStart.getDate() + daysDelta);
                            newEnd.setDate(newEnd.getDate() + daysDelta);
                            if (barEl) barEl.style.transform = `translateX(${daysDelta * dayWidth}px)`;
                        } else if (mode === 'resize-left') {
                            newStart.setDate(newStart.getDate() + daysDelta);
                            if (newStart > newEnd) newStart = new Date(newEnd);
                            const actualDelta = Math.floor((newStart - origStartDate) / (1000*60*60*24));
                            if (barEl) {
                                barEl.style.transform = `translateX(${actualDelta * dayWidth}px)`;
                                barEl.style.width = `${origWidth - actualDelta * dayWidth}px`;
                            }
                        } else if (mode === 'resize-right') {
                            newEnd.setDate(newEnd.getDate() + daysDelta);
                            if (newEnd < newStart) newEnd = new Date(newStart);
                            const newDuration = Math.floor((newEnd - newStart) / (1000*60*60*24)) + 1;
                            if (barEl) barEl.style.width = `${Math.max(newDuration, 1) * dayWidth - 4}px`;
                        }

                        dragPendingRef.current = {
                            issueId: issue.id,
                            newStart: formatDateStr(newStart),
                            newEnd: formatDateStr(newEnd),
                            originalStart: formatDateStr(origStartDate),
                            originalEnd: formatDateStr(origEndDate)
                        };
                    };

                    const handleMouseUp = () => {
                        // 清除 DOM 直接操作的樣式
                        if (barEl) {
                            barEl.style.transform = '';
                            barEl.style.width = '';
                        }
                        // 放開才 setState 觸發 re-render
                        if (dragPendingRef.current) {
                            setGanttPendingUpdate(dragPendingRef.current);
                        }
                        dragPendingRef.current = null;
                        setDragState(null);
                        window.removeEventListener('mousemove', handleMouseMove);
                        window.removeEventListener('mouseup', handleMouseUp);
                    };

                    setDragState({ issueId: issue.id, mode }); // 僅標記正在拖曳（隱藏 tooltip 等）
                    window.addEventListener('mousemove', handleMouseMove);
                    window.addEventListener('mouseup', handleMouseUp);
                };

                // --- 空白區域拖曳捲動（用 ref 避免 re-render） ---
                const handlePanStart = (e) => {
                    if (!ganttRef.current) return;
                    panRef.current = {
                        startX: e.clientX,
                        startY: e.clientY,
                        scrollLeft: ganttRef.current.scrollLeft,
                        scrollTop: ganttRef.current.scrollTop
                    };
                    e.preventDefault();
                    const handlePanMove = (ev) => {
                        if (!panRef.current || !ganttRef.current) return;
                        ganttRef.current.scrollLeft = panRef.current.scrollLeft - (ev.clientX - panRef.current.startX);
                        ganttRef.current.scrollTop = panRef.current.scrollTop - (ev.clientY - panRef.current.startY);
                    };
                    const handlePanEnd = () => {
                        panRef.current = null;
                        window.removeEventListener('mousemove', handlePanMove);
                        window.removeEventListener('mouseup', handlePanEnd);
                    };
                    window.addEventListener('mousemove', handlePanMove);
                    window.addEventListener('mouseup', handlePanEnd);
                };

                // 確認更新
                const confirmUpdate = async () => {
                    if (!ganttPendingUpdate) return;
                    setUpdating(true);
                    const ok = await updateIssueDates(ganttPendingUpdate.issueId, ganttPendingUpdate.newStart, ganttPendingUpdate.newEnd);
                    if (ok) {
                        // 更新本地資料
                        setGanttIssues(prev => prev.map(issue =>
                            issue.id === ganttPendingUpdate.issueId
                                ? { ...issue, start_date: ganttPendingUpdate.newStart, due_date: ganttPendingUpdate.newEnd }
                                : issue
                        ));
                    } else {
                        alert('更新失敗，請檢查 Redmine Token 或網路連線');
                    }
                    setGanttPendingUpdate(null);
                    setUpdating(false);
                };

                const cancelUpdate = () => setGanttPendingUpdate(null);

                // 週末判斷
                const isWeekend = (d) => d.getDay() === 0 || d.getDay() === 6;

                // 狀態色彩
                // 分類色彩：依 custom_fields 中的分類複選欄位判斷
                const getCategoryType = (issue) => {
                    const cf = issue.custom_fields;
                    if (!cf || !Array.isArray(cf)) return null;
                    for (const field of cf) {
                        const vals = Array.isArray(field.value) ? field.value : [field.value];
                        for (const v of vals) {
                            if (v === '519' || (v && v.includes('【外包】主要測試'))) return 'outsource-main';
                            if (v === '520' || (v && v.includes('【外包】局部協測'))) return 'outsource-partial';
                        }
                    }
                    return null;
                };

                // 判斷 issue 是否有 bar 在當日
                const isBarOnToday = (issue) => {
                    const s = parseDate(issue.start_date);
                    const e = parseDate(issue.due_date) || s;
                    if (!s) return false;
                    return today >= s && today <= e;
                };

                const getBarColor = (issue) => {
                    const catType = getCategoryType(issue);
                    const onToday = isBarOnToday(issue);
                    if (catType === 'outsource-main') return onToday ? 'bg-emerald-500' : 'bg-emerald-300/70';
                    if (catType === 'outsource-partial') return onToday ? 'bg-purple-400' : 'bg-purple-300/60';
                    const statusName = issue.status?.name || '';
                    if (statusName === '實作中') return 'bg-blue-500';
                    if (statusName === '擱置中') return 'bg-slate-400';
                    return 'bg-indigo-400';
                };

                const getBarBorderColor = (issue) => {
                    const catType = getCategoryType(issue);
                    if (catType === 'outsource-main') return 'border-emerald-600';
                    if (catType === 'outsource-partial') return 'border-purple-500';
                    const statusName = issue.status?.name || '';
                    if (statusName === '實作中') return 'border-blue-600';
                    if (statusName === '擱置中') return 'border-slate-500';
                    return 'border-indigo-500';
                };

                if (ganttLoading) {
                    return (
                        <div className="flex flex-col items-center justify-center p-20 bg-white rounded-xl border border-slate-200 shadow-sm">
                            <Loader2 size={32} className="animate-spin text-blue-500 mb-3" />
                            <p className="text-slate-500 text-sm">正在載入 Redmine 排程資料...</p>
                        </div>
                    );
                }

                if (ganttIssues.length === 0) {
                    return (
                        <div className="flex flex-col items-center justify-center p-20 bg-white rounded-xl border border-dashed border-slate-200">
                            <GanttChart size={48} className="text-slate-200 mb-3" />
                            <p className="text-slate-400 mb-3">尚無排程資料</p>
                            <button onClick={fetchGanttData} className="px-6 py-2 bg-blue-600 text-white rounded-lg shadow hover:bg-blue-700 transition-colors text-sm">載入排程</button>
                        </div>
                    );
                }

                return (
                    <div className="bg-white rounded-xl border border-slate-200 shadow-sm overflow-hidden">
                        {/* 標題列 */}
                        <div className="p-4 border-b border-slate-100 bg-slate-50/50 flex justify-between items-center">
                            <h3 className="font-semibold text-slate-700 flex items-center gap-2">
                                <GanttChart size={18} className="text-blue-500" /> 案件排程甘特圖
                                <span className="text-xs bg-blue-100 text-blue-700 px-2 py-0.5 rounded-full font-mono">{ganttIssues.length} 筆</span>
                            </h3>
                            <div className="flex items-center gap-2">
                                <button onClick={fetchGanttData} className="text-slate-400 hover:text-blue-600 p-1.5 rounded-full hover:bg-blue-50 transition-colors" title="重新載入">
                                    <RefreshCw size={14} />
                                </button>
                            </div>
                        </div>

                        {/* 甘特圖主體：統一卷軸 */}
                        <div
                            ref={ganttRef}
                            className="overflow-auto"
                            style={{ maxHeight: '75vh' }}
                            onMouseDown={handlePanStart}
                            onContextMenu={(e) => e.preventDefault()}
                        >
                            <div style={{ minWidth: leftPanelWidth + totalGanttWidth }}>
                                {/* Sticky 日期標頭列 */}
                                <div className="flex sticky top-0 z-20">
                                    <div className="sticky left-0 z-30 shrink-0 bg-slate-50 border-r border-b border-slate-200" style={{ width: leftPanelWidth }}>
                                        <div className="h-[38px] flex items-center px-3 text-xs font-bold text-slate-500 uppercase gap-3">
                                            <span className="w-[110px] shrink-0">專案</span>
                                            <span>主旨</span>
                                        </div>
                                    </div>
                                    <div className="flex border-b border-slate-200 bg-white shrink-0">
                                        {dateRange.map((d, i) => {
                                            const isToday = formatDateStr(d) === formatDateStr(today);
                                            const weekday = ['日','一','二','三','四','五','六'][d.getDay()];
                                            return (
                                                <div key={i}
                                                    className={`text-center text-[10px] font-medium border-r border-slate-100 shrink-0 py-2 ${isToday ? 'bg-blue-50 text-blue-700 font-bold' : isWeekend(d) ? 'bg-red-50/50 text-red-400' : 'text-slate-500'}`}
                                                    style={{ width: dayWidth }}
                                                >
                                                    <div>{d.getMonth()+1}/{d.getDate()}</div>
                                                    <div className="text-[9px]">({weekday})</div>
                                                </div>
                                            );
                                        })}
                                    </div>
                                </div>

                                {/* Body: 左欄 + 甘特圖 */}
                                <div className="flex">
                                    {/* 左欄：sticky left */}
                                    <div className="sticky left-0 z-20 shrink-0 border-r border-slate-200 bg-[#f8fafc]" style={{ width: leftPanelWidth }}>
                                        {groupedData.map((row, idx) => {
                                            if (row.type === 'header') {
                                                const dateObj = parseDate(row.date);
                                                const label = dateObj ? `${dateObj.getMonth()+1}/${dateObj.getDate()}` : row.date;
                                                return (
                                                    <div key={'h-' + row.date}
                                                        onClick={() => toggleCollapseDay(row.date)}
                                                        className="flex items-center gap-2 px-3 cursor-pointer hover:bg-blue-50 border-b border-slate-200 bg-slate-100/80 select-none transition-colors"
                                                        style={{ height: groupHeaderHeight }}
                                                    >
                                                        <ChevronRight size={12} className={`text-slate-400 transition-transform duration-200 ${!collapsedDays[row.date] ? 'rotate-90' : ''}`} />
                                                        <span className="text-xs font-bold text-slate-600">開始日 {label}</span>
                                                        <span className="text-[10px] bg-blue-100 text-blue-600 px-1.5 py-0.5 rounded font-mono">{row.count} 筆</span>
                                                    </div>
                                                );
                                            }
                                            const issue = row.issue;
                                            return (
                                                <div key={issue.id}
                                                    className="flex items-center border-b border-slate-100 px-3 gap-2 group relative"
                                                    style={{ height: rowHeight }}

                                                    onMouseLeave={() => setHoverIssueId(null)}
                                                >
                                                    <span className="w-[110px] shrink-0 text-[10px] text-slate-400 truncate font-medium" title={issue.project?.name}>{issue.project?.name?.replace(/【品檢組】/, '')}</span>
                                                    <a href={`https://igs.redmine-x.com/issues/${issue.id}`} target="_blank" rel="noopener noreferrer"
                                                        className="text-xs text-slate-700 truncate hover:text-blue-600 hover:underline cursor-pointer flex-1" title={issue.subject}
                                                    >{issue.subject}</a>
                                                    {hoverIssueId === issue.id && (
                                                        <div className="absolute left-full top-1/2 -translate-y-1/2 ml-2 z-50 bg-slate-800 text-white text-[11px] px-3 py-2 rounded-lg shadow-xl whitespace-nowrap pointer-events-none">
                                                            <div className="font-bold text-blue-300">#{issue.id}</div>
                                                            <div className="text-slate-300 mt-0.5">作者: {issue.author?.name || '-'}</div>
                                                        </div>
                                                    )}
                                                </div>
                                            );
                                        })}
                                    </div>

                                    {/* 右側甘特圖 */}
                                    <div className="relative shrink-0 overflow-hidden" style={{ width: totalGanttWidth, height: totalBodyHeight }}>
                                        {/* 格線 */}
                                        {dateRange.map((d, i) => {
                                            const isToday = formatDateStr(d) === formatDateStr(today);
                                            return (
                                                <div key={i}
                                                    className={`absolute top-0 bottom-0 border-r ${isToday ? 'border-blue-200 bg-blue-50/30' : isWeekend(d) ? 'border-slate-100 bg-red-50/20' : 'border-slate-100'}`}
                                                    style={{ left: i * dayWidth, width: dayWidth }}
                                                />
                                            );
                                        })}
                                        {/* 今日標記線（z-[1] 避免蓋住左側面板） */}
                                        <div className="absolute top-0 bottom-0 w-0.5 bg-blue-400 z-[1] pointer-events-none" style={{ left: 0 }} />
                                        {/* 分組標頭背景 + 水平分隔線 */}
                                        {groupedData.map((row, idx) => {
                                            if (row.type === 'header') {
                                                return <div key={'gh-' + row.date} className="absolute left-0 right-0 bg-slate-100/60 border-b border-slate-200" style={{ top: rowYOffsets[idx], height: groupHeaderHeight }} />;
                                            }
                                            return <div key={'hl-' + row.issue.id} className="absolute left-0 right-0 border-b border-slate-50" style={{ top: rowYOffsets[idx] + rowHeight }} />;
                                        })}
                                        {/* Bar 條 */}
                                        {groupedData.map((row, idx) => {
                                            if (row.type !== 'issue') return null;
                                            const issue = row.issue;
                                            const pos = getBarPosition(issue);
                                            if (!pos) return null;
                                            const isPending = ganttPendingUpdate && ganttPendingUpdate.issueId === issue.id;
                                            const barColor = getBarColor(issue);
                                            const borderColor = getBarBorderColor(issue);
                                            return (
                                                <div key={issue.id} className="absolute group/bar" data-issue-id={issue.id}
                                                    style={{ left: pos.left + 2, top: rowYOffsets[idx] + 8, width: pos.width, height: rowHeight - 16 }}
                                                >
                                                    <div className="absolute left-0 top-[-4px] bottom-[-4px] w-[3px] bg-slate-700 rounded-full z-10 pointer-events-none" />
                                                    <div
                                                        className={`h-full rounded-md ${barColor} ${isPending ? 'ring-2 ring-orange-400 ring-offset-1' : ''} border ${borderColor} shadow-sm cursor-grab active:cursor-grabbing relative transition-shadow hover:shadow-md select-none flex items-center justify-center`}
                                                        onMouseDown={(e) => handleMouseDown(e, issue, 'move')}
                                                        onMouseEnter={() => setHoverBarIssueId(issue.id)}
                                                        onMouseLeave={() => setHoverBarIssueId(null)}
                                                    >
                                                        {pos.width > 60 && <span className="text-white text-[10px] font-medium truncate px-2 pointer-events-none">{pos.duration}天</span>}
                                                        <div className="absolute left-0 top-0 bottom-0 w-2 cursor-col-resize hover:bg-white/30 rounded-l-md" onMouseDown={(e) => handleMouseDown(e, issue, 'resize-left')} />
                                                        <div className="absolute right-0 top-0 bottom-0 w-2 cursor-col-resize hover:bg-white/30 rounded-r-md" onMouseDown={(e) => handleMouseDown(e, issue, 'resize-right')} />
                                                    </div>
                                                    {hoverBarIssueId === issue.id && !dragState && (
                                                        <div className="absolute -top-8 left-1/2 -translate-x-1/2 z-50 bg-slate-800 text-white text-[11px] px-3 py-1.5 rounded-lg shadow-xl whitespace-nowrap pointer-events-none">
                                                            <span className="text-slate-300">分派:</span> <span className="font-bold text-emerald-300">{issue.assigned_to?.name || '未分派'}</span>
                                                        </div>
                                                    )}
                                                    {isPending && !dragState && (
                                                        <div className="absolute left-full top-1/2 -translate-y-1/2 ml-2 z-40 flex items-center gap-1 whitespace-nowrap">
                                                            <span className="text-[10px] text-orange-600 bg-orange-50 px-1.5 py-0.5 rounded border border-orange-200 font-mono">{ganttPendingUpdate.newStart} ~ {ganttPendingUpdate.newEnd}</span>
                                                            <button onClick={(e) => { e.stopPropagation(); confirmUpdate(); }} disabled={updating}
                                                                className="bg-green-500 hover:bg-green-600 text-white w-6 h-6 rounded flex items-center justify-center disabled:opacity-50 shadow-sm" title="確認更新"
                                                            >{updating ? <Loader2 size={10} className="animate-spin" /> : <Check size={10} />}</button>
                                                            <button onClick={(e) => { e.stopPropagation(); cancelUpdate(); }} disabled={updating}
                                                                className="bg-white hover:bg-slate-100 text-slate-500 w-6 h-6 rounded flex items-center justify-center disabled:opacity-50 shadow-sm border border-slate-200" title="取消"
                                                            ><X size={10} /></button>
                                                        </div>
                                                    )}
                                                </div>
                                            );
                                        })}
                                    </div>
                                </div>
                            </div>
                        </div>

                        {/* 底部狀態列 + 圖例 */}
                        <div className="px-4 py-2 border-t border-slate-100 bg-slate-50/50 flex items-center justify-between text-[10px] text-slate-400">
                            <div className="flex gap-4 flex-wrap">
                                <span className="flex items-center gap-1"><span className="w-2.5 h-2.5 rounded bg-blue-500"></span> 實作中</span>
                                <span className="flex items-center gap-1"><span className="w-2.5 h-2.5 rounded bg-slate-400"></span> 擱置中</span>
                                <span className="flex items-center gap-1"><span className="w-2.5 h-2.5 rounded bg-indigo-400"></span> 其他</span>
                                <span className="flex items-center gap-1"><span className="w-2.5 h-2.5 rounded bg-emerald-500"></span> 外包主要測試</span>
                                <span className="flex items-center gap-1"><span className="w-2.5 h-2.5 rounded bg-purple-400"></span> 外包局部協測</span>
                            </div>
                            <span>點擊左側日期分組可收折 · 拖曳 bar 條調整排程 · 需點擊確認才生效</span>
                        </div>
                    </div>
                );
            };

            useEffect(() => { if (spreadsheetId && mode === 'public') fetchData(); }, [spreadsheetId]);

            return (
                <div className="min-h-screen bg-slate-50 font-sans text-slate-800 flex flex-col">
                    {/* Top Bar */}
                    <div className="bg-white border-b border-slate-200 sticky top-0 z-30 shadow-sm">
                        <div className="max-w-7xl mx-auto px-4 md:px-6 h-16 flex items-center justify-between">
                            <div className="flex items-center gap-3">
                                <div className="bg-blue-600 text-white p-2 rounded-lg">
                                    <Activity size={20} />
                                </div>
                                <h1 className="text-xl font-bold text-slate-800 hidden md:block">案件管理系統</h1>
                                {autoRefresh && (
                                    <div className="flex items-center gap-2 px-3 py-1 bg-green-50 text-green-700 rounded-full text-xs font-mono border border-green-100 ml-2">
                                        <Zap size={12} className="animate-pulse" />
                                        自動同步: {Math.floor(countdown / 60)}:{(countdown % 60).toString().padStart(2, '0')}
                                    </div>
                                )}
                            </div>
                            <div className="flex items-center gap-3">
                                <div className="flex bg-slate-100 p-1 rounded-lg overflow-x-auto">
                                    <button onClick={() => setActiveTab('dashboard')} className={`flex items-center gap-2 px-3 md:px-4 py-2 rounded-md text-sm font-medium transition-all whitespace-nowrap ${activeTab === 'dashboard' ? 'bg-white text-blue-600 shadow-sm' : 'text-slate-500 hover:text-slate-700'}`}>
                                        <LayoutDashboard size={16} /> 進行中
                                    </button>
                                    {/* 新增功能: 分配概況按鈕 */}
                                    <button onClick={() => setActiveTab('assignment')} className={`flex items-center gap-2 px-3 md:px-4 py-2 rounded-md text-sm font-medium transition-all whitespace-nowrap ${activeTab === 'assignment' ? 'bg-white text-blue-600 shadow-sm' : 'text-slate-500 hover:text-slate-700'}`}>
                                        <Users size={16} /> 分配概況
                                    </button>
                                    {redmineToken && (
                                        <button onClick={() => setActiveTab('schedule')} className={`flex items-center gap-2 px-3 md:px-4 py-2 rounded-md text-sm font-medium transition-all whitespace-nowrap ${activeTab === 'schedule' ? 'bg-white text-blue-600 shadow-sm' : 'text-slate-500 hover:text-slate-700'}`}>
                                            <GanttChart size={16} /> 案件排程
                                        </button>
                                    )}
                                    <button onClick={() => setActiveTab('analytics')} className={`flex items-center gap-2 px-3 md:px-4 py-2 rounded-md text-sm font-medium transition-all whitespace-nowrap ${activeTab === 'analytics' ? 'bg-white text-blue-600 shadow-sm' : 'text-slate-500 hover:text-slate-700'}`}>
                                        <BarChart3 size={16} /> 分析
                                    </button>
                                    <button onClick={() => setActiveTab('console')} className={`flex items-center gap-2 px-3 md:px-4 py-2 rounded-md text-sm font-medium transition-all whitespace-nowrap ${activeTab === 'console' ? 'bg-white text-blue-600 shadow-sm' : 'text-slate-500 hover:text-slate-700'}`}>
                                        <Settings size={16} /> 設定
                                    </button>
                                </div>
                                <button
                                    onClick={() => fetchData()}
                                    disabled={loading}
                                    className="bg-slate-800 hover:bg-slate-700 text-white p-2 rounded-lg shadow-sm transition-colors flex items-center gap-2 disabled:opacity-50 h-10"
                                    title={`更新資料 (上次更新: ${lastUpdatedTime ? lastUpdatedTime.toLocaleTimeString() : '無'})`}
                                >
                                    <RefreshCw size={16} className={loading ? 'animate-spin' : ''} />
                                    <span className="text-xs font-bold hidden md:inline">更新</span>
                                </button>
                            </div>
                        </div>
                    </div>

                    <div className={`flex-1 mx-auto w-full p-4 md:p-6 ${activeTab === 'schedule' ? 'max-w-[1800px]' : 'max-w-7xl'}`}>

                        {/* === View 1: 進行中看板 (Dashboard) === */}
                        {activeTab === 'dashboard' && (
                            <div className="space-y-6 animate-in fade-in duration-300">
                                {!data && !loading && !error && (
                                    <div className="flex flex-col items-center justify-center p-12 bg-slate-100 rounded-xl border border-dashed border-slate-300 text-slate-400">
                                        <p className="mb-4">尚無資料顯示</p>
                                        <button onClick={() => fetchData()} className="px-6 py-2 bg-blue-600 text-white rounded-lg shadow hover:bg-blue-700 transition-colors">讀取資料</button>
                                    </div>
                                )}
                                {activeStats && (
                                    <>
                                        <div className="grid grid-cols-2 md:grid-cols-5 gap-4">
                                            <div className="bg-white p-4 rounded-xl border border-slate-200 shadow-sm flex flex-col h-full min-h-[110px]">
                                                <p className="text-xs text-slate-500 font-medium uppercase">測試中總數</p>
                                                <p className="text-4xl font-bold text-slate-800 mt-2">{activeStats.count}</p>
                                            </div>
                                            <div className="bg-white p-4 rounded-xl border border-green-100 shadow-sm flex flex-col h-full min-h-[110px]">
                                                <div className="flex justify-between items-start">
                                                    <div>
                                                        <p className="text-xs text-green-600 font-bold uppercase flex items-center gap-1">
                                                            <Briefcase size={12} /> 外包數量
                                                        </p>
